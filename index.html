<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Store Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ✅ OVERLAY -->
  <div id="focusOverlay"></div>

  <div class="header">
    <div class="header-title">Online Store Management</div>
    <div class="header-sub">Admin Dashboard</div>
  </div>

  <div class="container">

    <div class="summary">
      <div class="summary-card">
        <h3>Total Products</h3>
        <p id="totalProducts">0</p>
      </div>
      <div class="summary-card">
        <h3>Total Customers</h3>
        <p id="totalCustomers">0</p>
      </div>
      <div class="summary-card">
        <h3>Total Orders</h3>
        <p id="totalOrders">0</p>
      </div>
    </div>

    <div class="grid">

      <section class="card">
        <h2>Add Product</h2>
        <input type="text" id="productName" placeholder="Product Name">
        <input type="number" id="price" placeholder="Price">
        <input type="number" id="stock" placeholder="Stock">
        <input type="text" id="imageUrl" placeholder="Image URL (optional)">
        <textarea id="productSpecs" placeholder="Specifications (optional)"></textarea>
        <button onclick="addProduct()">Add Product</button>
      </section>

      <section class="card">
        <h2>Products</h2>
        <ul id="productsList"></ul>
      </section>

      <section class="card">
        <h2>Add Customer</h2>
        <input type="text" id="customerName" placeholder="Customer Name">
        <input type="email" id="customerEmail" placeholder="Email">
        <button onclick="addCustomer()">Add Customer</button>
      </section>

      <section class="card">
        <h2>Customers</h2>
        <ul id="customersList"></ul>
      </section>

      <section class="card">
        <h2>Create Order</h2>
        <label>Customer:</label>
        <select id="orderCustomerId"></select>

        <label>Product:</label>
        <select id="orderProductId"></select>

        <input type="number" id="quantity" placeholder="Quantity" min="1">
        <button onclick="createOrder()">Create Order</button>
      </section>

      <section class="card">
        <h2>Orders</h2>
        <ul id="ordersList"></ul>
      </section>

    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
